<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lost City Map Editor</title>
    <link rel="stylesheet" href="/src/ui/styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="sidebar-left">
        <div id="tab-bar">
          <button class="tab active" data-tab="map">Map</button>
          <button class="tab" data-tab="tiles">Tiles</button>
          <button class="tab" data-tab="locs">OBJECTS</button>
          <button class="tab" data-tab="npcs">NPCs</button>
          <button class="tab" data-tab="objs">ITEMS</button>
        </div>
        <div id="sidebar-content" class="tab-panel active"></div>
        <div id="tab-panel-tiles" class="tab-panel"></div>
        <div id="tab-panel-locs" class="tab-panel"></div>
        <div id="tab-panel-npcs" class="tab-panel"></div>
        <div id="tab-panel-objs" class="tab-panel"></div>
        <div id="sidebar-minimap-container">
          <canvas id="minimapCanvas" width="64" height="64"></canvas>
        </div>
      </div>
      <canvas id="glCanvas"></canvas>
      <div id="sidebar-right">
        <canvas id="modelPreviewCanvas" width="284" height="284"></canvas>
        <div id="tile-inspector-mount"></div>
        <div id="entity-inspector-mount"></div>
      </div>
    </div>
    <!-- Floating Build Tool overlay — shown via Build menu -->
    <div id="build-overlay">
      <div id="build-overlay-header">
        <span id="build-overlay-title"></span>
        <button id="build-overlay-close">✕</button>
      </div>
      <div id="build-panel-prefab"></div>
      <div id="build-panel-bridge" style="display:none">
        <div class="placeholder" style="padding:12px 8px;font-size:11px">
          Bridge Generator — coming soon
        </div>
      </div>
    </div>

    <div class="status-bar" id="status-bar">Lost City Map Editor — ready</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
